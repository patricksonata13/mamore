<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CRM Simples</title>
</head>
<body>
<h1>Stone Brothers - Projetos</h1>
<pre id="output">Carregando...</pre>
<script>
fetch('/api/leads')
  .then(res => res.json())
  .then(data => {
    document.getElementById('output').innerHTML = JSON.stringify(data, null, 2);
  })
  .catch(err => {
    document.getElementById('output').innerHTML = 'Erro: ' + err.message;
  });
</script>
</body>
</html>
