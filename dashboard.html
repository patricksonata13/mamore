<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard Stone Brothers</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  body{font-family:system-ui;padding:2rem;background:#fafaf7}
  .cards{display:flex;gap:2rem;margin-bottom:2rem}
  .card{background:#fff;padding:1rem;border-radius:8px;flex:1;text-align:center}
  .number{font-size:2rem;font-weight:600}
  canvas{max-height:300px;margin-bottom:2rem}
</style>
</head>
<body>
<h1>Dashboard Stone Brothers</h1>
<div class="cards" id="stats"></div>
<canvas id="chartStatus"></canvas>
<canvas id="chartMaterial"></canvas>
<canvas id="chartDaily"></canvas>
<script>
async function carregarDashboard() {
  const res = await fetch('/api/leads');
  const data = await res.json();
  const projetos = data.data;
  document.getElementById('stats').innerHTML = `
    <div class="card"><div class="number">${projetos.length}</div><div>Projetos</div></div>
    <div class="card"><div class="number">${projetos.reduce((a,b)=>a+(b.valor_estimado||0),0).toFixed(2)}</div><div>Valor total (R$)</div></div>
    <div class="card"><div class="number">${projetos.filter(p=>p.status==='aprovado').length}</div><div>Aprovados</div></div>
  `;
  const statusCount = { novo:0, contatado:0, orcamento_enviado:0, negociacao:0, aprovado:0, perdido:0 };
  const materialCount = {};
  const dailyCount = {};
  projetos.forEach(p => {
    statusCount[p.status]++;
    if (p.material) materialCount[p.material] = (materialCount[p.material] || 0) + 1;
    const day = new Date(p.created_at).toISOString().split('T')[0];
    dailyCount[day] = (dailyCount[day] || 0) + 1;
  });
  new Chart(document.getElementById('chartStatus'), { type: 'bar', data: { labels: Object.keys(statusCount), datasets: [{ label: 'Projetos por status', data: Object.values(statusCount) }] } });
  new Chart(document.getElementById('chartMaterial'), { type: 'pie', data: { labels: Object.keys(materialCount), datasets: [{ label: 'Materiais', data: Object.values(materialCount) }] } });
  new Chart(document.getElementById('chartDaily'), { type: 'line', data: { labels: Object.keys(dailyCount), datasets: [{ label: 'Projetos por dia', data: Object.values(dailyCount) }] } });
}
carregarDashboard();
</script>
</body>
</html>
