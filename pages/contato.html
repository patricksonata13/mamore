<section class="section">
  <div class="section-header">
    <h2>Solicitar <em>orçamento</em></h2>
    <p>Preencha o formulário e retornamos em até 2 horas</p>
  </div>
  <div style="max-width: 600px; margin: 0 auto;">
    <form id="contatoForm">
      <div class="form-group"><label>Nome completo</label><input type="text" id="nome" required></div>
      <div class="form-group"><label>WhatsApp</label><input type="tel" id="tel" required></div>
      <div class="form-group"><label>Serviço</label><select id="servico"><option>Bancada de cozinha</option><option>Bancada de banheiro</option><option>Revestimento</option><option>Escada</option><option>Outro</option></select></div>
      <div class="form-group"><label>Detalhes</label><textarea id="mensagem" rows="3" placeholder="Material de interesse, medidas aproximadas..."></textarea></div>
      <button type="submit">Enviar via WhatsApp</button>
    </form>
  </div>
</section>
