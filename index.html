<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stone Atelier — Mármore & Design</title>

  <meta name="description" content="Mármore e granito no Rio de Janeiro. Projetos sob medida com estética contemporânea.">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
  <a href="#" class="logo">Stone Atelier</a>
  <a href="#orcamento" class="nav-cta">Contato</a>
</nav>

<section class="hero">
  <div>
    <h1>Pedra que <em>transforma</em> espaços</h1>
    <p>Projetos em mármore e granito com estética contemporânea no Rio de Janeiro.</p>
    <a href="#orcamento" class="btn">Solicitar orçamento</a>
  </div>
</section>

<section class="section">
  <h2>Materiais</h2>
  <div id="materiais"></div>
</section>

<section id="orcamento" class="section">
  <h2>Orçamento</h2>
  <form id="form">
    <input type="text" placeholder="Nome" id="nome" required>
    <input type="tel" placeholder="WhatsApp" id="tel" required>
    <textarea placeholder="Projeto"></textarea>
    <button type="submit">Enviar</button>
  </form>
</section>

<script src="js/app.js"></script>
</body>
</html>
