<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Stone Brothers – Buscar Imagens</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0e0e0e;color:#fafaf7;font-family:system-ui;padding:2rem}
  h1{font-weight:300;margin-bottom:.5rem}
  .sub{color:#8a7f71;margin-bottom:2rem}
  .tabs{display:flex;gap:0;border-bottom:1px solid #333;margin-bottom:2rem}
  .tab{padding:.8rem 1.5rem;background:0;border:none;color:#aaa;cursor:pointer}
  .tab.active{color:#c8bfae;border-bottom:2px solid #c8bfae}
  .search-bar{display:flex;gap:1rem;margin-bottom:2rem}
  .search-bar input{flex:1;padding:1rem;background:#1a1a1a;border:1px solid #444;color:#fff}
  .search-bar button{padding:1rem 2rem;background:#c8bfae;color:#111;border:none;cursor:pointer}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1.5rem}
  .card{background:#1a1a1a;border-radius:6px;overflow:hidden}
  .card img{width:100%;height:160px;object-fit:cover}
  .card-info{padding:1rem}
  .card-info p{font-size:.75rem;color:#aaa;margin-bottom:.5rem}
  .btn-save{width:100%;padding:.5rem;background:#c8bfae;color:#111;border:none;cursor:pointer;font-size:.7rem;text-transform:uppercase}
  .loading{text-align:center;padding:3rem;color:#aaa}
  .notify{position:fixed;bottom:20px;right:20px;background:#c8bfae;color:#111;padding:1rem;border-radius:4px}
</style>
</head>
<body>
<h1>Stone Brothers — Banco de Imagens</h1>
<p class="sub">Busque e salve fotos de mármore/granito na galeria do site</p>

<div class="tabs">
  <button class="tab active" data-src="pexels">Pexels</button>
  <button class="tab" data-src="unsplash">Unsplash</button>
</div>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Ex: bancada mármore branco" value="marmore cozinha">
  <button onclick="buscar()">Buscar</button>
</div>

<div id="results" class="grid"><div class="loading">Escolha uma fonte e clique em Buscar</div></div>

<script>
let currentSource = 'pexels';
const API_BASE = 'http://localhost:5679';

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentSource = tab.dataset.src;
    document.getElementById('results').innerHTML = '<div class="loading">Clique em Buscar para pesquisar no ' + currentSource.toUpperCase() + '</div>';
  });
});

async function buscar() {
  const q = document.getElementById('searchInput').value;
  if (!q) return;
  const grid = document.getElementById('results');
  grid.innerHTML = '<div class="loading">Carregando...</div>';
  try {
    const res = await fetch(`${API_BASE}/api/search/${currentSource}?q=${encodeURIComponent(q)}`);
    const data = await res.json();
    if (!data.success || !data.photos?.length) {
      grid.innerHTML = '<div class="loading">Nenhum resultado. Tente outro termo.</div>';
      return;
    }
    grid.innerHTML = data.photos.map(photo => `
      <div class="card">
        <img src="${photo.url}" loading="lazy">
        <div class="card-info">
          <p>📸 ${photo.photographer || photo.source || 'Desconhecido'}</p>
          <button class="btn-save" onclick="salvar('${photo.url}', '${(photo.photographer || '').replace(/'/g, "\\'")}')">Salvar na galeria</button>
        </div>
      </div>
    `).join('');
  } catch(err) {
    grid.innerHTML = '<div class="loading">Erro. Verifique se o webhook está rodando.</div>';
    console.error(err);
  }
}

async function salvar(url, caption) {
  const btn = event.target;
  btn.textContent = 'Salvando...';
  btn.disabled = true;
  try {
    const res = await fetch(`${API_BASE}/api/save-image`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ imageUrl: url, caption, source: currentSource })
    });
    const data = await res.json();
    if (data.success) {
      alert('✅ Imagem salva! Atualize a página do site (Ctrl+F5) para ver.');
    } else {
      alert('❌ Erro: ' + data.error);
    }
  } catch(err) {
    alert('❌ Erro de conexão');
  }
  btn.textContent = 'Salvar na galeria';
  btn.disabled = false;
}
</script>
</body>
</html>
